<meta charset="UTF-8">
<title>Car Search</title>

<style>

body{
background:#00000000;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* SEARCH BAR */

.search-container{
    display:flex;
    width:100%;
    max-width:500px; /* perfect for navbar */
}

.search-box{
flex:1;
padding:12px 15px;
font-size:16px;
border:1px solid #00eaff;
background:#121212;
color:white;
border-radius:40px 0 0 40px;
outline:none;
box-shadow:0 0 10px #00eaff;
transition:0.3s;
}

.highlight{
color:#00eaff;
font-weight:bold;
}

.search-box:focus{
box-shadow:0 0 20px #00eaff,0 0 40px #00eaff;
}

.search-btn{
width:60px;
border:1px solid #303030;
border-left:none;
background:#222;
color:white;
border-radius:0 40px 40px 0;
cursor:pointer;
}

/* RESULTS */

#results{
width:600px;
background:#121212;
border-radius:10px;
margin-top:5px;
overflow:hidden;
}

.car{
display:flex;
align-items:center;
gap:12px;
padding:10px;
cursor:pointer;
}

.car:hover{
background:#1f1f1f;
}

.car img{
width:90px;
height:55px;
object-fit:cover;
border-radius:5px;
}
#results{
    position:absolute;
    width:300px;
    top:50px;
    z-index:999;
}
.search-frame{
    width:320px;
    height:60px;
    border:none;
}
.search-box {
    flex: 1;
    padding: 10px 15px;
    font-size: 14px;
    border-radius: 40px;
    border: none;
    outline: none;
    background: #121212;
    color: white;
    position: relative;
    z-index: 1;
}
.search-container {
    position: relative;
    width: 100%;
    max-width: 450px;
    border-radius: 40px;
    overflow: visible;
}

/* Rainbow glow layer */
.search-container::before {
    content: "";
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    border-radius: 40px;

    background: linear-gradient(
        45deg,
        red, orange, yellow, green, cyan, blue, violet, turquoise
    );

    background-size: 400%;
    animation: rainbowMove 6s linear infinite;

    z-index: 0;
    filter: blur(8px); /* glow strength */
}
@keyframes rainbowMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 400% 50%; }
}
.search-btn {
    width: 50px;
    height: 100%; /* match input height */

    border: none;
    background: #00eaff; /* bright color */
    color: #000; /* icon visible */

    border-radius: 0 40px 40px 0;
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 18px;

    box-shadow: 0 0 10px #00eaff;
    transition: 0.3s;
}
.search-btn:hover {
    background: #40e0d0;
    box-shadow:
        0 0 10px #40e0d0,
        0 0 20px #40e0d0;
}
.search-container {
    display: flex;
    align-items: center;
}
.search-btn {
    background: red;
}
.search-container::before {
    z-index: 0;
}
.search-box {
    position: relative;
    z-index: 1;
}
.search-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);

    color: #00eaff;
    font-size: 18px;

    z-index: 2; /* 👈 THIS FIXES IT */
}
.search-icon {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);

    background: transparent;
    border: none;

    color: #00eaff;
    font-size: 18px;
    cursor: pointer;

    z-index: 2;

    padding: 5px;
}

/* Hover glow */
.search-icon:hover {
    text-shadow:
        0 0 5px cyan,
        0 0 10px cyan,
        0 0 20px blue;
}


</style>

let input=document.getElementById("search");
let results=document.getElementById("results");
input.addEventListener("input",function(){

let value=input.value.toLowerCase();
results.innerHTML="";

if(value==="") return;

let count=0;

cars.forEach(car=>{

if(car.toLowerCase().includes(value) && count<7){

let div=document.createElement("div");
div.className="car";

let highlighted = car.replace(
new RegExp(value,"gi"),
match => "<span class='highlight'>"+match+"</span>"
);

div.innerHTML =
"<span>"+highlighted+"</span>";

div.onclick=function(){
input.value=car;
results.innerHTML="";
};

results.appendChild(div);

count++;

}

});

});

document.querySelector(".search-icon").addEventListener("click", () => {
    input.focus();

    let event = new Event("input");
    input.dispatchEvent(event);
});

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        document.querySelector(".search-icon").click();
    }
});
