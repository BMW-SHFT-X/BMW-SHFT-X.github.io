<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supercar Database</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Orbitron,sans-serif;
    background:#0a0a0a;
    color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:1000;
}

.navbar h1{
    color:#00c6ff;
}

.search-box{
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* Grid */

.car-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:40px;
}

/* Cards */

.card{
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    overflow:hidden;
    transition:0.4s;
    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px #00c6ff;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h2{
    margin-top:0;
}

.spec{
    color:#00c6ff;
    margin:8px 0;
}

.btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.btn:hover{
    box-shadow:0 0 20px #00c6ff;
}

</style>
</head>

<body>

<div class="navbar">
    <h1>Supercar Database</h1>

    <input type="text"
           id="search"
           class="search-box"
           placeholder="Search cars..."
           onkeyup="searchCars()">
</div>

<div class="car-grid" id="carGrid"></div>

<script>

const cars = [

{
    name:"BMW M3",
    image:"https://images.unsplash.com/photo-1555215695-3004980ad54e",
    engine:"3.0L Twin Turbo",
    hp:"503 HP",
    speed:"290 km/h"
},

{
    name:"Bugatti Chiron",
    image:"https://images.unsplash.com/photo-1544636331-e26879cd4d9b",
    engine:"W16 Quad Turbo",
    hp:"1500 HP",
    speed:"420 km/h"
},

{
    name:"Porsche 911",
    image:"https://images.unsplash.com/photo-1503376780353-7e6692767b70",
    engine:"Flat-6 Turbo",
    hp:"473 HP",
    speed:"308 km/h"
},

{
    name:"McLaren P1",
    image:"https://shorturl.at/C8KW8",
    engine:"Hybrid Twin Turbo",
    hp:"903 HP",
    speed:"350 km/h"
},

{
    name:"Ferrari SF90",
    image:"https://shorturl.at/QWzLm",
    engine:"4.0L Twin Turbo V8",
    hp:"986 HP",
    speed:"340 km/h"
},

{
    name:"Nissan GT-R",
    image:"https://shorturl.at/vGRq2",
    engine:"3.8L Twin Turbo V6",
    hp:"565 HP",
    speed:"315 km/h"
},

{
    name:"Koenigsegg Jesko",
    image:"https://shorturl.at/0Cz0e",
    engine:"5.0L Twin Turbo V8",
    hp:"1600 HP",
    speed:"480 km/h"
},

{
    name:"Lamborghini Aventador",
    image:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c",
    engine:"6.5L V12",
    hp:"769 HP",
    speed:"350 km/h"
},

{
    name:"Audi R8",
    image:"https://shorturl.at/HwQAg",
    engine:"5.2L V10",
    hp:"602 HP",
    speed:"330 km/h"
},

{
    name:"Toyota Supra Fast And Furious",
    image:"https://wallpapercave.com/wp/wp8204728.jpg",
    engine:"3.0L Turbo",
    hp:"382 HP",
    speed:"250 km/h"
}

];

const carGrid = document.getElementById("carGrid");

function displayCars(carArray){

    carGrid.innerHTML = "";

    carArray.forEach(car => {

        carGrid.innerHTML += `

        <div class="card">

            <img src="${car.image}">

            <div class="card-content">

                <h2>${car.name}</h2>

                <p class="spec">
                Engine: ${car.engine}
                </p>

                <p class="spec">
                Horsepower: ${car.hp}
                </p>

                <p class="spec">
                Top Speed: ${car.speed}
                </p>

                <button class="btn">
                View Details
                </button>

            </div>

        </div>

        `;

    });

}

displayCars(cars);

function searchCars(){

    let input =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    let filteredCars = cars.filter(car =>
        car.name.toLowerCase().includes(input)
    );

    displayCars(filteredCars);

}

</script>

<script>

function searchCars(){

    let input =
        document.getElementById("search")
        .value
        .toLowerCase();

    let cards =
        document.querySelectorAll(".card");

    cards.forEach(card => {

        let title =
            card.querySelector("h2")
            .innerText
            .toLowerCase();

        if(title.includes(input)){
            card.style.display = "block";
        }
        else{
            card.style.display = "none";
        }

    });

}

</script>

</body>
</html>
